services:
  jixiao2-api:
    build:
      context: ./server-java
    ports:
      - "8081:8081"
    env_file:
      - ./server-java/.env
    environment:
      SPRING_PROFILES_ACTIVE: prod

  jixiao2-web:
    build:
      context: ./client-vue
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8081}
    ports:
      - "8080:80"
    depends_on:
      - jixiao2-api
