server:
  port: ${SERVER_PORT:8081}
  error:
    include-message: always

spring:
  application:
    name: jixiao2-server-java
  datasource:
    url: ${JIXIAO2_JDBC_URL:jdbc:mysql://172.25.1.43:3306/jixiao?characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${JIXIAO2_JDBC_USER:root}
    password: ${JIXIAO2_JDBC_PASSWORD:e+ZmCeLXY9UBqbbS}

jixiao2:
  cors:
    allowed-origin-patterns: ${JIXIAO2_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*}
  session:
    secret: ${SESSION_JWT_SECRET:}
    cookie:
      path: ${JIXIAO2_SESSION_COOKIE_PATH:/}
      domain: ${JIXIAO2_SESSION_COOKIE_DOMAIN:}
      same-site: ${JIXIAO2_SESSION_COOKIE_SAME_SITE:Lax}
      secure: ${JIXIAO2_SESSION_COOKIE_SECURE:auto}
  feishu:
    # 本地默认（与 server-java/.env 一致）；生产请用环境变量覆盖 FEISHU_APP_ID / FEISHU_APP_SECRET
    app-id: ${FEISHU_APP_ID:${JIXIAO2_FEISHU_APP_ID:cli_a95e20834da35ccb}}
    app-secret: ${FEISHU_APP_SECRET:${JIXIAO2_FEISHU_APP_SECRET:E9LL9YoJA988T2eB8XEcjgBh5ZOpD3sV}}
    redirect-uri: ${FEISHU_REDIRECT_URI:}
    # 绩效卡片：不配则用下方 web-app-link-app-id 的 AppLink（飞书内）；若配 http(s) 会包一层 web_url AppLink 尽量在客户端内打开
    notify-frontend-base-url: ${JIXIAO2_PUBLIC_APP_URL:}
    notify-feishu-web-app-url: ${JIXIAO2_FEISHU_WEB_APP_URL:}
    # 绩效卡片 AppLink 打开「网页应用」用（可与登录/发 IM 的 app-id 不同）；未配 AppLink 时回退 feishu.app-id
    web-app-link-app-id: ${JIXIAO2_FEISHU_WEB_APP_LINK_APP_ID:cli_aa89a8cede789bec}
    web-app-link-app-secret: ${JIXIAO2_FEISHU_WEB_APP_LINK_APP_SECRET:}
    performance-notify-enabled: ${JIXIAO2_FEISHU_PERFORMANCE_NOTIFY:true}

logging:
  charset:
    console: UTF-8
    file: UTF-8
  file:
    name: logs/jixiao2-server.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 30
      file-name-pattern: "logs/jixiao2-server-%d{yyyy-MM-dd}.%i.log.gz"

# Actuator：默认暴露 mappings 便于核对已注册 HTTP 路由（含 /auth/feishu/**）。
# 生产若不想对外暴露完整路由表，可设环境变量：MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE=health,info
management:
  endpoints:
    web:
      exposure:
        include: health,info,mappings
